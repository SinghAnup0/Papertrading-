<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensibull-Lite Proxy-Free Trader</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #111827;
      --card-bg: #1f2937;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --call-color: #059669;
      --put-color: #dc2626;
      --accent: #2563eb;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      margin: 0; padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 20px; border-bottom: 1px solid #374151;
    }
    .controls { display: flex; gap: 15px; margin: 20px 0; align-items: center; }
    select, button {
      background-color: var(--card-bg); color: white;
      border: 1px solid #4b5563; padding: 10px 15px; border-radius: 6px; cursor: pointer;
    }
    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    .card { background-color: var(--card-bg); border-radius: 8px; padding: 20px; }
    table { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; }
    th { background-color: #111827; color: var(--text-muted); padding: 10px; }
    td { padding: 10px; border-bottom: 1px solid #374151; }
    .strike-row { background-color: #111827; font-weight: bold; }
    .ce-zone { background-color: rgba(5, 150, 105, 0.05); }
    .pe-zone { background-color: rgba(220, 38, 38, 0.05); }
    .action-btn { padding: 4px 10px; font-size: 11px; margin: 2px; border-radius: 4px; color: white; cursor:pointer;}
    .buy-btn { background: var(--call-color); border: none; }
    .sell-btn { background: var(--put-color); border: none; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div><i class="fa-solid fa-chart-line"></i> Native GitHub Paper Trader (No Proxy)</div>
    <div id="underlying-price" style="font-weight:600;">Spot Price: Fetching JSON...</div>
  </header>

  <div class="controls">
    <select id="expirySelect" onchange="renderMatrixUI()"></select>
    <button onclick="loadLocalJson()"><i class="fa-solid fa-sync"></i> Refresh Data</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Live Option Chain Matrix (NIFTY)</h3>
      <div id="tableWrapper">
        <table>
          <thead>
            <tr>
              <th colspan="3" style="color:var(--call-color)">CALLS (CE)</th>
              <th>Strike</th>
              <th colspan="3" style="color:var(--put-color)">PUTS (PE)</th>
            </tr>
            <tr>
              <th>OI</th>
              <th>LTP</th>
              <th>Action</th>
              <th>Strike</th>
              <th>Action</th>
              <th>LTP</th>
              <th>OI</th>
            </tr>
          </thead>
          <tbody id="optionChainBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h3>My Local Positions</h3>
      <div id="portfolioBody"></div>
    </div>
  </div>
</div>

<script>
  let nseRawPayload = null;

  window.onload = function() {
    loadLocalJson();
    renderPortfolio();
  };

  async function loadLocalJson() {
    try {
      // Direct call to your own repository file without any proxies
      const res = await fetch('./data.json?cache_bust=' + new Date().getTime());
      const data = await res.json();
      nseRawPayload = data;
      
      document.getElementById('underlying-price').innerText = `Spot Price: ${data.records.underlyingValue}`;
      
      const expirySelect = document.getElementById('expirySelect');
      expirySelect.innerHTML = "";
      data.records.expiryDates.forEach(date => {
        let opt = document.createElement('option');
        opt.value = date; opt.innerText = date;
        expirySelect.appendChild(opt);
      });

      renderMatrixUI();
    } catch (err) {
      console.error(err);
      document.getElementById('underlying-price').innerText = "Data JSON initializing. Please trigger the GitHub Action manually to start.";
    }
  }

  function renderMatrixUI() {
    if(!nseRawPayload) return;
    const selectedExpiry = document.getElementById('expirySelect').value;
    const tableBody = document.getElementById('optionChainBody');
    tableBody.innerHTML = "";

    nseRawPayload.filtered.data.forEach(row => {
      if(row.expiryDate !== selectedExpiry) return;

      const tr = document.createElement('tr');
      const ceLtp = row.CE ? row.CE.lastPrice : '-';
      const ceOi = row.CE ? row.CE.openInterest : '-';
      const peLtp = row.PE ? row.PE.lastPrice : '-';
      const peOi = row.PE ? row.PE.openInterest : '-';
      const strike = row.strikePrice;

      tr.innerHTML = `
        <td class="ce-zone">${ceOi}</td>
        <td class="ce-zone" style="color:var(--call-color)">${ceLtp}</td>
        <td class="ce-zone"><button class="action-btn buy-btn" onclick="saveTrade('${strike}','CE',${ceLtp})">B</button></td>
        <td class="strike-row">${strike}</td>
        <td class="pe-zone"><button class="action-btn buy-btn" onclick="saveTrade('${strike}','PE',${peLtp})">B</button></td>
        <td class="pe-zone" style="color:var(--put-color)">${peLtp}</td>
        <td class="pe-zone">${peOi}</td>
      `;
      tableBody.appendChild(tr);
    });
  }

  function saveTrade(strike, type, price) {
    let trades = localStorage.getItem('trades') ? JSON.parse(localStorage.getItem('trades')) : [];
    trades.push({ strike, type, price, time: new Date().toLocaleTimeString() });
    localStorage.setItem('trades', JSON.stringify(trades));
    renderPortfolio();
  }

  function renderPortfolio() {
    const container = document.getElementById('portfolioBody');
    let trades = localStorage.getItem('trades') ? JSON.parse(localStorage.getItem('trades')) : [];
    if(trades.length === 0) { container.innerHTML = '<p>No open positions.</p>'; return; }
    let html = '<table>';
    trades.forEach(t => { html += `<tr><td>NIFTY ${t.strike} ${t.type}</td><td>₹${t.price}</td></tr>`; });
    container.innerHTML = html + '</table>';
  }
</script>
</body>
</html>
